<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Tracking - KKCK Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .time {
            font-weight: 600;
        }

        .status-icons {
            display: flex;
            gap: 6px;
        }

        .app-content {
            background: white;
            height: calc(100% - 40px);
            border-radius: 30px 30px 0 0;
            overflow-y: auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 24px 20px;
            color: white;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .back-btn {
            margin-bottom: 12px;
            font-size: 24px;
            cursor: pointer;
        }

        .content-wrapper {
            padding: 20px;
            padding-bottom: 120px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* Scanner Section */
        .scanner-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .scanner-icon {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 20px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            position: relative;
            overflow: hidden;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            animation: scan 2s infinite;
        }

        @keyframes scan {

            0%,
            100% {
                top: 0;
            }

            50% {
                top: 100%;
            }
        }

        .scanner-text {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .scanner-subtext {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .scan-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .scan-btn:active {
            transform: scale(0.95);
        }

        /* Quick Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Scanned Items */
        .scanned-items {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
        }

        .items-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .clear-all-btn {
            color: #E80E15;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        .material-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .material-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .material-info {
            flex: 1;
        }

        .material-name {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .material-code {
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }

        .material-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .material-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 11px;
            color: #666;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 700;
            color: #333;
        }

        /* Utilization Input */
        .utilization-section {
            background: #f5f7ff;
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
        }

        .utilization-header {
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .quantity-input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            flex: 1;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            background: #667eea;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qty-btn:active {
            background: #5568d3;
        }

        .qty-input {
            flex: 1;
            border: none;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: #333;
            padding: 8px;
        }

        .qty-input:focus {
            outline: none;
        }

        .unit-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            min-width: 40px;
        }

        .confirm-usage-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .remove-item-btn {
            color: #E80E15;
            font-size: 20px;
            cursor: pointer;
            font-weight: 700;
            margin-left: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* Bottom Actions */
        /* Bottom Actions */
        .bottom-actions {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 16px 20px;
            padding-bottom: 20px;
            border-top: 1px solid #e5e5e5;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }



        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
            text-align: center;
        }

        .modal-subtitle {
            font-size: 13px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }

        .qr-scanner-view {
            background: #000;
            border-radius: 12px;
            height: 240px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .scanner-frame {
            width: 200px;
            height: 200px;
            border: 3px solid #667eea;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
        }

        .scanner-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
        }

        .corner-tl {
            top: -3px;
            left: -3px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: -3px;
            right: -3px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: -3px;
            left: -3px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: -3px;
            right: -3px;
            border-left: none;
            border-top: none;
        }

        .scanner-line-vertical {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            animation: scanVertical 2s infinite;
        }

        @keyframes scanVertical {

            0%,
            100% {
                top: 0;
            }

            50% {
                top: 100%;
            }
        }

        .manual-entry-btn {
            width: 100%;
            padding: 12px;
            background: #f5f7ff;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .modal-close-btn {
            width: 100%;
            padding: 12px;
            background: #e5e5e5;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Success Animation */
        .scan-success {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            animation: successPop 0.5s ease-out;
        }

        @keyframes successPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="screen">
            <div class="status-bar">
                <span class="time">9:41</span>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📡</span>
                    <span>🔋</span>
                </div>
            </div>
            <div class="app-content">
                <div class="header">
                    <div class="back-btn">←</div>
                    <h1>Material Tracking</h1>
                    <p>Scan QR code to track utilization</p>
                </div>
                <div class="content-wrapper">
                    <!-- Scanner Section -->
                    <div class="scanner-container">
                        <div class="scanner-icon">
                            📷
                            <div class="scan-line"></div>
                        </div>
                        <div class="scanner-text">Scan Material QR Code</div>
                        <div class="scanner-subtext">Position the QR code within the frame</div>
                        <button class="scan-btn" onclick="openScanner()">
                            🔍 Start Scanning
                        </button>
                    </div>

                    <!-- Quick Stats -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="scanned-count">0</div>
                            <div class="stat-label">Scanned Today</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="pending-count">0</div>
                            <div class="stat-label">Pending Usage</div>
                        </div>
                    </div>

                    <!-- Scanned Items Section -->
                    <div class="section">
                        <div class="scanned-items">
                            <div class="items-header">
                                <div class="section-title" style="margin: 0;">Scanned Materials</div>
                                <div class="clear-all-btn" onclick="clearAll()" id="clear-btn" style="display: none;">
                                    Clear All</div>
                            </div>

                            <div id="materials-container">
                                <div class="empty-state">
                                    <div class="empty-icon">📦</div>
                                    <div class="empty-text">No materials scanned</div>
                                    <div style="font-size: 12px; color: #999;">Scan a QR code to get started</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bottom-actions">
                    <button class="action-btn" id="submit-btn" onclick="submitTracking()" disabled>
                        Submit Utilization Records
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scanner Modal -->
    <div class="modal-overlay" id="scanner-modal">
        <div class="modal">
            <div class="modal-title">Scan QR Code</div>
            <div class="modal-subtitle">Align the QR code within the frame</div>

            <div class="qr-scanner-view">
                <div class="scanner-frame">
                    <div class="scanner-corner corner-tl"></div>
                    <div class="scanner-corner corner-tr"></div>
                    <div class="scanner-corner corner-bl"></div>
                    <div class="scanner-corner corner-br"></div>
                    <div class="scanner-line-vertical"></div>
                </div>
                <div class="scan-success" id="scan-success">✓</div>
            </div>

            <button class="manual-entry-btn" onclick="manualEntry()">
                ⌨️ Enter Material Code Manually
            </button>
            <button class="modal-close-btn" onclick="closeScanner()">Close</button>
        </div>
    </div>

    <script>
        let materials = [];
        let scannedCount = 0;
        let pendingCount = 0;

        // Sample material database
        const materialDatabase = {
            'MAT001': { name: 'Premium Starter Feed', code: 'MAT001', batch: 'BRD2526-1001', quantity: 500, unit: 'KG', type: 'Feed', location: 'Warehouse A' },
            'MAT002': { name: 'Vitamin B Complex', code: 'MAT002', batch: 'MED2526-0045', quantity: 50, unit: 'L', type: 'Medicine', location: 'Warehouse B' },
            'MAT003': { name: 'Newcastle Vaccine', code: 'MAT003', batch: 'VAC2526-0123', quantity: 100, unit: 'ML', type: 'Vaccine', location: 'Cold Storage' },
            'MAT004': { name: 'Layer Feed Premium', code: 'MAT004', batch: 'BRD2526-1002', quantity: 750, unit: 'KG', type: 'Feed', location: 'Warehouse A' },
            'MAT005': { name: 'Antibiotics Mix', code: 'MAT005', batch: 'MED2526-0067', quantity: 25, unit: 'L', type: 'Medicine', location: 'Warehouse B' }
        };

        function openScanner() {
            document.getElementById('scanner-modal').classList.add('active');
            // Simulate scanning after 2 seconds
            setTimeout(() => {
                simulateScan();
            }, 2000);
        }

        function closeScanner() {
            document.getElementById('scanner-modal').classList.remove('active');
            document.getElementById('scan-success').style.display = 'none';
        }

        function simulateScan() {
            // Randomly select a material from database
            const codes = Object.keys(materialDatabase);
            const randomCode = codes[Math.floor(Math.random() * codes.length)];

            // Show success animation
            const successIcon = document.getElementById('scan-success');
            successIcon.style.display = 'block';

            setTimeout(() => {
                addMaterial(randomCode);
                closeScanner();
            }, 800);
        }

        function manualEntry() {
            const code = prompt('Enter Material Code:');
            if (code && materialDatabase[code.toUpperCase()]) {
                addMaterial(code.toUpperCase());
                closeScanner();
            } else if (code) {
                alert('Material code not found in database');
            }
        }

        function addMaterial(code) {
            const material = materialDatabase[code];
            if (!material) return;

            // Check if already scanned
            if (materials.find(m => m.code === code)) {
                alert('This material has already been scanned');
                return;
            }

            const newMaterial = {
                ...material,
                scannedAt: new Date().toLocaleTimeString(),
                usedQuantity: 0,
                status: 'pending'
            };

            materials.unshift(newMaterial);
            scannedCount++;
            pendingCount++;

            renderMaterials();
            updateStats();
        }

        function renderMaterials() {
            const container = document.getElementById('materials-container');
            const clearBtn = document.getElementById('clear-btn');
            const submitBtn = document.getElementById('submit-btn');

            if (materials.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <div class="empty-text">No materials scanned</div>
                        <div style="font-size: 12px; color: #999;">Scan a QR code to get started</div>
                    </div>
                `;
                clearBtn.style.display = 'none';
                submitBtn.disabled = true;
            } else {
                container.innerHTML = materials.map((material, index) => `
                    <div class="material-card">
                        <div class="material-header">
                            <div class="material-info">
                                <div class="material-name">${material.name}</div>
                                <div class="material-code">Code: ${material.code} • Batch: ${material.batch}</div>
                            </div>
                            <div style="display: flex; align-items: center;">
                                <span class="material-badge">${material.type}</span>
                                <span class="remove-item-btn" onclick="removeMaterial(${index})">×</span>
                            </div>
                        </div>
                        
                        <div class="material-details">
                            <div class="detail-item">
                                <div class="detail-label">Available Qty</div>
                                <div class="detail-value">${material.quantity} ${material.unit}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Location</div>
                                <div class="detail-value">${material.location}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Scanned At</div>
                                <div class="detail-value">${material.scannedAt}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Status</div>
                                <div class="detail-value" style="color: ${material.status === 'confirmed' ? '#2e7d32' : '#f57c00'}">
                                    ${material.status === 'confirmed' ? '✓ Confirmed' : '⏱ Pending'}
                                </div>
                            </div>
                        </div>

                        <div class="utilization-section">
                            <div class="utilization-header">
                                📊 Record Utilization
                            </div>
                            <div class="quantity-input-group">
                                <div class="quantity-control">
                                    <button class="qty-btn" onclick="decreaseQty(${index})">−</button>
                                    <input type="number" class="qty-input" id="qty-${index}" value="${material.usedQuantity}" 
                                           onchange="updateQuantity(${index}, this.value)" min="0" max="${material.quantity}">
                                    <button class="qty-btn" onclick="increaseQty(${index})">+</button>
                                </div>
                                <span class="unit-label">${material.unit}</span>
                                <button class="confirm-usage-btn" onclick="confirmUsage(${index})">
                                    ${material.status === 'confirmed' ? '✓' : 'Confirm'}
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
                clearBtn.style.display = 'block';
                submitBtn.disabled = materials.filter(m => m.status === 'confirmed').length === 0;
            }
        }

        function increaseQty(index) {
            const input = document.getElementById(`qty-${index}`);
            const max = materials[index].quantity;
            const current = parseInt(input.value) || 0;
            if (current < max) {
                input.value = current + 1;
                updateQuantity(index, input.value);
            }
        }

        function decreaseQty(index) {
            const input = document.getElementById(`qty-${index}`);
            const current = parseInt(input.value) || 0;
            if (current > 0) {
                input.value = current - 1;
                updateQuantity(index, input.value);
            }
        }

        function updateQuantity(index, value) {
            const qty = parseInt(value) || 0;
            const max = materials[index].quantity;

            if (qty > max) {
                alert(`Cannot exceed available quantity of ${max} ${materials[index].unit}`);
                document.getElementById(`qty-${index}`).value = materials[index].usedQuantity;
                return;
            }

            materials[index].usedQuantity = qty;
        }

        function confirmUsage(index) {
            const qty = parseInt(document.getElementById(`qty-${index}`).value) || 0;

            if (qty === 0) {
                alert('Please enter a quantity greater than 0');
                return;
            }

            materials[index].status = 'confirmed';
            materials[index].usedQuantity = qty;

            // Update pending count
            pendingCount = materials.filter(m => m.status === 'pending').length;

            renderMaterials();
            updateStats();
        }

        function removeMaterial(index) {
            if (confirm('Remove this material from tracking?')) {
                if (materials[index].status === 'pending') {
                    pendingCount--;
                }
                materials.splice(index, 1);
                renderMaterials();
                updateStats();
            }
        }

        function clearAll() {
            if (confirm('Clear all scanned materials?')) {
                materials = [];
                scannedCount = 0;
                pendingCount = 0;
                renderMaterials();
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('scanned-count').textContent = scannedCount;
            document.getElementById('pending-count').textContent = pendingCount;
        }

        function submitTracking() {
            const confirmedMaterials = materials.filter(m => m.status === 'confirmed');

            if (confirmedMaterials.length === 0) {
                alert('Please confirm at least one material usage');
                return;
            }

            const summary = confirmedMaterials.map(m =>
                `${m.name}: ${m.usedQuantity} ${m.unit}`
            ).join('\n');

            alert(`Utilization records submitted successfully!\n\n${summary}\n\nData will be synced to SAP.`);

            // Clear confirmed materials
            materials = materials.filter(m => m.status === 'pending');
            renderMaterials();
            updateStats();
        }
    </script>
</body>

</html>
